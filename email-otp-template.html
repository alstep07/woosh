<html>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:48px 16px;">
  <tr>
    <td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:12px;overflow:hidden;">

        <!-- Header -->
        <tr>
          <td style="background:#0A0F1E;padding:32px 48px;text-align:center;">
            <span style="font-size:26px;font-weight:700;color:#ffffff;letter-spacing:-0.5px;">woosh</span>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:48px 48px 32px 48px;">
            <h1 style="margin:0 0 16px 0;font-size:24px;font-weight:700;color:#0f172a;line-height:1.3;">
              Your verification code
            </h1>
            <p style="margin:0 0 32px 0;font-size:15px;color:#475569;line-height:1.6;">
              Use the code below to verify your email and set up your Woosh account. It expires in {{expiry_long}}.
            </p>

            <!-- Code box -->
            <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 32px 0;">
              <tr>
                <td style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:24px;text-align:center;">
                  <span style="font-size:36px;font-weight:700;letter-spacing:8px;color:#0A0F1E;font-family:'Courier New',monospace;">{{code}}</span>
                </td>
              </tr>
            </table>

            <p style="margin:0;font-size:14px;color:#94a3b8;line-height:1.6;">
              If you didn't request this code, you can safely ignore this email — no account will be created.
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:24px 48px 40px 48px;border-top:1px solid #f1f5f9;">
            <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.6;">
              Questions? Email us at <a href="mailto:support@woosh.app" style="color:#0EA5E9;text-decoration:none;">support@woosh.app</a>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
